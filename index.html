<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dipta Tarafder | Professional Hub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #a855f7;
            --bg: #020617;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
            --text-p: #f8fafc;
            --text-s: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }

        body {
            background-color: var(--bg);
            background-image: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(168, 85, 247, 0.1) 0px, transparent 50%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            perspective: 1000px;
        }

        /* Floating Info Box (The Background Layer) */
        .floating-info {
            position: absolute;
            width: 500px;
            height: 300px;
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            filter: blur(80px);
            opacity: 0.15;
            border-radius: 50%;
            animation: float-bg 10s infinite alternate;
            z-index: 0;
        }

        @keyframes float-bg {
            from { transform: translate(-10%, -10%) rotate(0deg); }
            to { transform: translate(10%, 10%) rotate(20deg); }
        }

        /* Main Master Card */
        .master-card {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 400px;
            background: var(--glass);
            backdrop-filter: blur(30px);
            border: 1px solid var(--border);
            border-radius: 40px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 50px 100px -20px rgba(0,0,0,0.5);
            transition: transform 0.3s ease;
        }

        /* Floating Information Box (Visible UI) */
        .info-tab {
            position: absolute;
            top: -20px;
            right: -30px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            backdrop-filter: blur(10px);
            padding: 12px 20px;
            border-radius: 20px;
            font-size: 0.75rem;
            color: var(--primary);
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            animation: bounce 3s infinite ease-in-out;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0) rotate(5deg); }
            50% { transform: translateY(-10px) rotate(5deg); }
        }

        /* Profile Image Section */
        .profile-container {
            position: relative;
            width: 140px;
            height: 140px;
            margin: 0 auto 25px;
        }

        .profile-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid var(--bg);
            position: relative;
            z-index: 2;
        }

        .profile-container::before {
            content: '';
            position: absolute;
            inset: -4px;
            background: linear-gradient(45deg, var(--primary), var(--secondary), var(--primary));
            background-size: 200%;
            border-radius: 50%;
            z-index: 1;
            animation: border-flow 4s linear infinite;
        }

        @keyframes border-flow {
            0% { background-position: 0% 50%; }
            100% { background-position: 200% 50%; }
        }

        h1 {
            color: var(--text-p);
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            margin-bottom: 5px;
        }

        .role {
            color: var(--text-s);
            font-size: 0.9rem;
            margin-bottom: 30px;
            display: block;
        }

        /* Highly Modified Button Stack */
        .link-stack {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .link-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            padding: 16px 20px;
            border-radius: 20px;
            text-decoration: none;
            color: var(--text-p);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .link-card:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: scale(1.03) translateX(5px);
            border-color: var(--primary);
        }

        .link-label {
            display: flex;
            align-items: center;
            gap: 15px;
            font-weight: 500;
        }

        .link-label i { font-size: 1.4rem; }

        /* Icon Colors */
        .fa-facebook { color: #1877F2; }
        .fa-whatsapp { color: #25D366; }
        .fa-instagram { color: #E4405F; }
        .fa-envelope { color: #EA4335; }

        .chevron {
            font-size: 0.7rem;
            opacity: 0.3;
        }
    </style>
</head>
<body>

        <div class="profile-container">

        </div>

        <h1>Dip Tarafder</h1>
        <span class="role">Social_contacts</span>

        <div class="link-stack">
            <a href="https://www.facebook.com/share/14Vurwwd31C/" class="link-card" target="_blank">
                <div class="link-label">
                    <i class="fab fa-facebook"></i>
                    <span>Facebook</span>
                </div>
                <i class="fas fa-chevron-right chevron"></i>
            </a>

            <a href="https://wa.me/qr/KMJH36GYYS26B1" class="link-card" target="_blank">
                <div class="link-label">
                    <i class="fab fa-whatsapp"></i>
                    <span>WhatsApp</span>
                </div>
                <i class="fas fa-chevron-right chevron"></i>
            </a>

            <a href="https://www.instagram.com/diptarafderr?igsh=MWd3c3N2bjZzZGFrbw==" class="link-card" target="_blank">
                <div class="link-label">
                    <i class="fab fa-instagram"></i>
                    <span>Instagram</span>
                </div>
                <i class="fas fa-chevron-right chevron"></i>
            </a>

            <a href="mailto:diptarafd3t@gmail.com" class="link-card">
                <div class="link-label">
                    <i class="fas fa-envelope"></i>
                    <span>Email Me</span>
                </div>
                <i class="fas fa-chevron-right chevron"></i>
            </a>
        </div>
    </div>

</body>
  </html>
